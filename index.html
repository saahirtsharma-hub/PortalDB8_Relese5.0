<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 10 Portal - NZ Cave Edition</title>
    <style>
        /* 
           ================================================================
           1. CORE SYSTEM ARCHITECTURE (LINES 1-80)
           ================================================================
        */
        :root {
            --win-accent: #0078D7;
            --win-glass: rgba(20, 20, 20, 0.88);
            --win-sidebar: rgba(0, 0, 0, 0.45);
            --win-border: rgba(255, 255, 255, 0.15);
            --win-hover: rgba(255, 255, 255, 0.12);
            --win-danger: #E81123;
            --font-main: 'Segoe UI', 'Frutiger', 'Dejavu Sans', Arial, sans-serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; outline: none; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: var(--font-main); color: white;
            background-color: #000; /* Safety black background */
        }

        /* 
           ================================================================
           2. NEW ZEALAND WALLPAPER ENGINE (LINES 81-150)
           ================================================================
        */
        #desktop-environment {
            position: relative;
            height: 100vh;
            width: 100vw;
            /* USING A HIGH-RELIABILITY LINK FOR THE NZ CAVE BACKGROUND */
            background-image: url('https://images.unsplash.com');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 1;
        }

        /* 
           ================================================================
           3. TASKBAR & SYSTEM UI (LINES 151-240)
           ================================================================
        */
        #taskbar {
            height: 40px; width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            display: flex; justify-content: space-between;
            align-items: center; z-index: 99999;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .taskbar-left { display: flex; height: 100%; }

        #start-trigger {
            width: 48px; height: 100%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }

        #start-trigger:hover { background: var(--win-hover); }
        #start-trigger svg { width: 18px; fill: white; }

        .system-tray {
            height: 100%; display: flex; align-items: center;
            padding: 0 12px; cursor: default; font-size: 12px;
            transition: background 0.2s;
        }
        .system-tray:hover { background: var(--win-hover); }
        .clock-stack { text-align: right; line-height: 1.1; }

        /* 
           ================================================================
           4. START MENU & ACRYLIC (LINES 241-380)
           ================================================================
        */
        #portal-start-menu {
            position: absolute; bottom: 40px; left: 0;
            width: 700px; height: 620px;
            background: var(--win-glass);
            backdrop-filter: blur(45px) saturate(180%);
            border: 1px solid var(--win-border);
            display: none; flex-direction: row;
            box-shadow: 0 25px 70px rgba(0,0,0,0.9);
            z-index: 99998;
            animation: startAppear 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes startAppear {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .menu-sidebar {
            width: 280px; background: var(--win-sidebar);
            display: flex; flex-direction: column; padding: 20px 0;
        }

        .section-label {
            padding: 10px 25px; font-size: 11px; font-weight: 600;
            text-transform: uppercase; color: #999; letter-spacing: 1px;
        }

        .nav-item {
            padding: 15px 25px; font-size: 14px;
            cursor: pointer; display: flex; align-items: center;
            border-left: 4px solid transparent; transition: 0.15s;
        }

        .nav-item:hover {
            background: var(--win-hover);
            border-left-color: var(--win-accent);
        }

        .nav-item i { margin-right: 20px; width: 24px; font-style: normal; font-size: 20px; text-align: center; }

        /* 
           ================================================================
           5. PORTAL TILE ENGINE (LINES 381-500)
           ================================================================
        */
        .portal-grid-container { flex: 1; padding: 40px; overflow-y: auto; }
        .portal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .portal-tile {
            width: 100%; aspect-ratio: 1 / 1;
            background: var(--win-accent);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer; position: relative; transition: 0.1s;
        }

        .portal-tile:hover { outline: 2px solid rgba(255, 255, 255, 0.5); transform: scale(0.98); }
        .tile-graphic { font-size: 38px; margin-bottom: 12px; }
        .tile-caption { font-size: 12px; text-align: center; font-weight: 400; padding: 0 8px; }

        /* DELETE MODE STYLES */
        .is-deleting .portal-tile {
            background: var(--win-danger) !important;
            animation: shakeTile 0.3s infinite ease-in-out;
        }

        @keyframes shakeTile {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1.5deg); }
            75% { transform: rotate(-1.5deg); }
            100% { transform: rotate(0deg); }
        }

        .del-badge { position: absolute; top: 5px; right: 10px; font-weight: bold; font-size: 18px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="desktop-environment">
    <div id="portal-start-menu">
        <div class="menu-sidebar">
            <div class="section-label">System Portal</div>
            
            <div class="nav-item" onclick="PortalCore.addSite()">
                <i>➕</i> <span>1. Add Website</span>
            </div>

            <div class="nav-item" onclick="PortalCore.clearSites()">
                <i>🗑️</i> <span>2. Delete All</span>
            </div>

            <div class="nav-item" onclick="PortalCore.toggleDelete()">
                <i>❌</i> <span id="del-status">3. Delete Mode: OFF</span>
            </div>

            <div class="nav-item" onclick="PortalCore.refresh()">
                <i>🌐</i> <span>4. Show Your Websites</span>
            </div>

            <div style="margin-top: auto; padding: 25px; font-size: 10px; color: #444;">
                Portal OS Build 10.0.520<br>Wharariki Cave Edition
            </div>
        </div>

        <div class="portal-grid-container">
            <div class="section-label" style="padding-left:0">Pinned Tiles</div>
            <div class="portal-grid" id="main-grid"></div>
        </div>
    </div>

    <div id="taskbar">
        <div class="taskbar-left">
            <div id="start-trigger" onclick="PortalCore.toggleMenu()">
                <svg viewBox="0 0 88 88"><path d="M0,12.4L35.7,7.3V42.9H0V12.4z M0,47.5h35.7v35.6L0,78V47.5z M40.1,6.7L88,0v42.9H40.1V6.7z M40.1,47.5H88V88l-47.9-6.7V47.5z"/></svg>
            </div>
        </div>
        <div class="system-tray">
            <div class="clock-stack">
                <div id="time">12:00 PM</div>
                <div id="date" style="font-size: 10px;">1/1/2026</div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * ================================================================
     * 6. JAVASCRIPT SYSTEM ENGINE (LINES 501-680)
     * ================================================================
     */
    const PortalCore = {
        sites: JSON.parse(localStorage.getItem('win10_portal_sites')) || [],
        delMode: false,
        
        // Audio Library
        sounds: {
            launch: new Audio('https://www.soundjay.com'),
            click: new Audio('https://www.soundjay.com'),
            pop: new Audio('https://www.soundjay.com'),
            error: new Audio('https://www.soundjay.com')
        },

        init() {
            this.syncTime();
            setInterval(() => this.syncTime(), 1000);
            this.render();
            console.log("Portal Initialized with " + this.sites.length + " links.");
        },

        syncTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString();
        },

        toggleMenu() {
            const menu = document.getElementById('portal-start-menu');
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
            } else {
                this.sounds.pop.play();
                menu.style.display = 'flex';
            }
        },

        addSite() {
            const name = prompt("Site Name (e.g. YouTube):");
            if (!name) return;
            let url = prompt("Address (e.g. youtube.com):");
            if (!url) return;

            // Automation Logic: Auto-adds https://
            if (!url.includes('://')) url = 'https://' + url;

            this.sites.push({ name, url });
            this.save();
            this.render();
            this.sounds.click.play();
        },

        clearSites() {
            if (confirm("Erase all website tiles?")) {
                this.sites = [];
                this.save();
                this.render();
                this.sounds.error.play();
            }
        },

        toggleDelete() {
            this.delMode = !this.delMode;
            const status = document.getElementById('del-status');
            const grid = document.getElementById('main-grid');
            
            if (this.delMode) {
                status.innerText = "3. Delete Mode: ON";
                status.style.color = "#ff4d4d";
                grid.classList.add('is-deleting');
            } else {
                status.innerText = "3. Delete Mode: OFF";
                status.style.color = "white";
                grid.classList.remove('is-deleting');
            }
            this.sounds.click.play();
        },

        refresh() {
            this.render();
            this.sounds.pop.play();
            alert("Tiles refreshed. " + this.sites.length + " links ready.");
        },

        save() { localStorage.setItem('win10_portal_sites', JSON.stringify(this.sites)); },

        render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            this.sites.forEach((site, i) => {
                const tile = document.createElement('div');
                tile.className = 'portal-tile';
                tile.innerHTML = `<div class="tile-graphic">🌐</div><div class="tile-caption">${site.name}</div>${this.delMode ? '<div class="del-badge">×</div>':''}`;
                tile.onclick = () => {
                    if (this.delMode) {
                        this.sites.splice(i, 1);
                        this.save();
                        this.render();
                        this.sounds.error.play();
                    } else {
                        this.sounds.launch.play();
                        setTimeout(() => window.open(site.url, '_blank'), 150);
                    }
                };
                grid.appendChild(tile);
            });
        }
    };

    PortalCore.init();

    // Close on clicking desktop
    document.getElementById('desktop-environment').addEventListener('mousedown', (e) => {
        if (e.target.id === 'desktop-environment') document.getElementById('portal-start-menu').style.display = 'none';
    });
</script>
</body>
</html>
